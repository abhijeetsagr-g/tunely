name: tunely
description: "Local Music Player."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0-296.2.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  on_audio_query: ^2.9.0
  audio_service: ^0.18.18
  just_audio: ^0.10.5
  flutter_bloc: ^9.1.1
  collection: ^1.19.1
  audio_wave: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
